name: CICD for java projects
on: 
 push:
   branches:
     - main
 workflow_dispatch:
jobs:
  build:
   runs-on: ubuntu-latest
   steps:
     - name: checkout code
       uses: actions/checkout@v3
     - name: set up jdk 11
       uses: actions/setup-java@v3
       with:
         distribution: 'adopt'
         java-version: '11'
     - name: Build with maven
       run: mvn clean install -f MyWebApp/pom.xml
      
       

